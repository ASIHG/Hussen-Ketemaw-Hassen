name: afro_space_mobile
description: AFRO SPACE AI SaaS OS - Mobile Command Center
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.0
  motion: ^0.0.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: google_fonts/SpaceGrotesk-Regular.ttf
    - family: JetBrainsMono
      fonts:
        - asset: google_fonts/JetBrainsMono-Regular.ttf
